<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个线上网页</title>
    <style>
        /* 这里是 CSS：负责网页的“颜值” */
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #764ba2;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            min-height: 60px; /* 预留高度防止抖动 */
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #5a6fd6;
        }

        .loading {
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <!-- 这里是 HTML：负责网页的“骨架” -->
    <div class="card">
        <h1>👋 欢迎来到我的主页</h1>
        <p id="content">点击下面的按钮，看看会发生什么？</p>
        <button onclick="getJoke()">获取今日快乐</button>
    </div>

    <!-- 这里是 JavaScript：负责网页的“大脑”和“能力” -->
    <script>
        async function getJoke() {
            const contentDiv = document.getElementById('content');
            const btn = document.querySelector('button');
            
            // 1. 改变状态
            contentDiv.innerHTML = '<span class="loading">正在从互联网获取数据...</span>';
            btn.disabled = true;
            btn.innerText = "加载中...";

            try {
                // 2. 发起网络请求 (这就是直接双击文件时通常会被拦截的功能)
                // 我们使用一个公开的免费 API 接口
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                const data = await response.json();

                // 3. 更新页面内容
                contentDiv.innerHTML = `<strong>${data.setup}</strong><br><br>${data.punchline}`;
            } catch (error) {
                contentDiv.innerText = "哎呀，数据获取失败了，请检查网络或稍后再试。";
            } finally {
                // 4. 恢复按钮状态
                btn.disabled = false;
                btn.innerText = "再讲一个";
            }
        }
    </script>
</body>
</html>
